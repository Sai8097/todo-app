<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Smart Todo</title>
  <meta name="description" content="TaskFlow: A premium todo app with user roles, admin panel, and real-time task management." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="init()">

  <!-- Animated Background -->
  <div class="bg-wrap">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <!-- ════════════════════════════════════════════
       LOGIN PAGE
  ════════════════════════════════════════════ -->
  <div id="page-login">
    <div class="login-card glass">
      <div class="brand">
        <div class="brand-icon">✓</div>
        <h1>TaskFlow</h1>
        <p>Sign in to manage your tasks</p>
      </div>

      <div class="form-group">
        <label for="inp-username">Username</label>
        <input id="inp-username" type="text" placeholder="e.g. admin, alice, bob" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="inp-password">Password</label>
        <div class="pw-wrap">
          <input id="inp-password" type="password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()" />
          <button class="pw-toggle" onclick="togglePw()" id="pw-eye" title="Show/hide password">👁</button>
        </div>
      </div>

      <p id="login-error" class="error-msg hidden"></p>

      <button class="btn-primary w-full" onclick="login()" id="btn-login">
        <span id="btn-login-text">Sign In</span>
        <span id="btn-login-spin" class="spinner hidden"></span>
      </button>

      <div class="login-hint glass-subtle">
        <strong>Demo credentials:</strong><br />
        admin / admin123 &nbsp;|&nbsp; alice / alice123<br/>
        bob / bob123 &nbsp;|&nbsp; charlie / charlie123
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════
       DASHBOARD PAGE
  ════════════════════════════════════════════ -->
  <div id="page-dashboard" class="hidden">

    <!-- NAVBAR -->
    <nav class="navbar glass">
      <div class="nav-brand">
        <span class="nav-icon">✓</span>
        <span class="nav-title">TaskFlow</span>
      </div>
      <div class="nav-right">
        <span id="badge-user" class="user-badge"></span>
        <span id="badge-role" class="role-badge"></span>
        <button class="btn-outline" onclick="logout()" id="btn-logout">Sign Out</button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- STATS BAR -->
      <section class="stats-bar">
        <div class="stat-card glass-subtle">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card glass-subtle">
          <div class="stat-num green" id="stat-done">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card glass-subtle">
          <div class="stat-num yellow" id="stat-pending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <!-- Admin only: user count -->
        <div class="stat-card glass-subtle" id="stat-users-card" style="display:none">
          <div class="stat-num purple" id="stat-users">0</div>
          <div class="stat-label">Users</div>
        </div>
      </section>

      <!-- FILTER BAR -->
      <section class="filter-bar">
        <div class="filter-tabs">
          <button class="tab active" id="tab-all" onclick="setFilter('all')">All</button>
          <button class="tab" id="tab-pending" onclick="setFilter('pending')">Pending</button>
          <button class="tab" id="tab-done" onclick="setFilter('done')">Completed</button>
        </div>
        <div class="filter-right">
          <!-- Admin: filter by user -->
          <select id="filter-user" class="select-sm hidden" onchange="loadTasks()">
            <option value="">All Users</option>
          </select>
          <button class="btn-primary sm" onclick="openAddModal()" id="btn-add-task">
            + Add Task
          </button>
        </div>
      </section>

      <!-- TASK LIST -->
      <section class="task-list" id="task-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">📋</div>
          <p>No tasks yet. Click <strong>+ Add Task</strong> to get started!</p>
        </div>
      </section>

    </main>
  </div>

  <!-- ════════════════════════════════════════════
       ADD / EDIT TASK MODAL
  ════════════════════════════════════════════ -->
  <div id="modal-task" class="modal-overlay hidden" onclick="closeModalOnBg(event)">
    <div class="modal-box glass">
      <div class="modal-header">
        <h2 id="modal-title">Add Task</h2>
        <button class="btn-icon-close" onclick="closeModal()" title="Close">✕</button>
      </div>

      <input type="hidden" id="edit-task-id" />

      <div class="form-group">
        <label for="inp-title">Task Title *</label>
        <input id="inp-title" type="text" placeholder="What needs to be done?" />
      </div>
      <div class="form-group">
        <label for="inp-desc">Description</label>
        <textarea id="inp-desc" placeholder="Optional details..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="inp-priority">Priority</label>
          <select id="inp-priority">
            <option value="High">🔥 High</option>
            <option value="Medium" selected>⚡ Medium</option>
            <option value="Low">🌱 Low</option>
          </select>
        </div>
        <div class="form-group">
          <label for="inp-due">Due Date</label>
          <input id="inp-due" type="date" />
        </div>
      </div>

      <!-- Admin: assign to user -->
      <div class="form-group hidden" id="assign-group">
        <label for="inp-assign">Assign to User</label>
        <select id="inp-assign">
          <option value="">— Assign to myself (admin) —</option>
        </select>
      </div>

      <p id="modal-error" class="error-msg hidden"></p>

      <div class="modal-actions">
        <button class="btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveTask()" id="btn-save-task">Save Task</button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════
       ADMIN: VIEW USER DATA MODAL
  ════════════════════════════════════════════ -->
  <div id="modal-user-data" class="modal-overlay hidden" onclick="closeUserDataModalOnBg(event)">
    <div class="modal-box glass wide">
      <div class="modal-header">
        <h2 id="modal-user-title">User Tasks</h2>
        <button class="btn-icon-close" onclick="closeUserDataModal()" title="Close">✕</button>
      </div>
      <div id="modal-user-tasks" class="task-list modal-task-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
